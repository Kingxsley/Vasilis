<!doctype html>
<html lang="en" dir="auto">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0a0a0f" />
        
        <!-- SEO Meta Tags -->
        <meta name="description" content="VasilisNetShield - Human + AI Powered Security Training. Protect your organization with realistic phishing simulations, malicious ad detection, and social engineering defense training." />
        <meta name="keywords" content="cybersecurity training, phishing simulation, security awareness, employee training, social engineering, malicious ads, security platform" />
        <meta name="author" content="Vasilis NetShield" />
        <meta name="robots" content="index, follow" />
        
        <!-- Open Graph / Social Media -->
        <meta property="og:type" content="website" />
        <meta property="og:title" content="VasilisNetShield | Security Training Platform" />
        <meta property="og:description" content="Human + AI Powered Security Training. Build a security-aware workforce with realistic simulations." />
        <meta property="og:site_name" content="Vasilis NetShield" />
        
        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="VasilisNetShield | Security Training Platform" />
        <meta name="twitter:description" content="Human + AI Powered Security Training. Build a security-aware workforce." />
        
        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Chivo:wght@400;700&display=swap" rel="stylesheet" />
        
        <!-- Favicon -->
        <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        
        <!-- Canonical URL — must match actual domain -->
        <link rel="canonical" href="https://vasilisnetshield.com" />

        <!-- Open Graph image (used by LinkedIn, Facebook, Slack previews) -->
        <meta property="og:url" content="https://vasilisnetshield.com" />
        <meta property="og:image" content="https://vasilisnetshield.com/og-image.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta name="twitter:image" content="https://vasilisnetshield.com/og-image.png" />

        <!-- Structured Data: Organization + WebSite (helps Google Knowledge Panel) -->
        <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@graph": [
            {
              "@type": "Organization",
              "@id": "https://vasilisnetshield.com/#organization",
              "name": "Vasilis NetShield",
              "url": "https://vasilisnetshield.com",
              "logo": {
                "@type": "ImageObject",
                "url": "https://vasilisnetshield.com/favicon.svg"
              },
              "description": "Human + AI Powered Cybersecurity Awareness Training. Phishing simulations, social engineering defence, and security awareness programmes.",
              "sameAs": []
            },
            {
              "@type": "WebSite",
              "@id": "https://vasilisnetshield.com/#website",
              "url": "https://vasilisnetshield.com",
              "name": "Vasilis NetShield",
              "publisher": { "@id": "https://vasilisnetshield.com/#organization" },
              "potentialAction": {
                "@type": "SearchAction",
                "target": "https://vasilisnetshield.com/blog?q={search_term_string}",
                "query-input": "required name=search_term_string"
              }
            }
          ]
        }
        </script>

        <title>Vasilis NetShield | Cybersecurity Awareness Training Platform</title>
        
        <!-- RTL Support CSS -->
        <style>
            /* Auto-detect RTL text direction */
            [dir="rtl"], .rtl {
                direction: rtl;
                text-align: right;
            }
            [dir="ltr"], .ltr {
                direction: ltr;
                text-align: left;
            }
            /* Ensure content respects direction */
            .content-auto {
                unicode-bidi: plaintext;
            }
        </style>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
